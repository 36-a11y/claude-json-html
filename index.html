<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 紀錄還原與 PDF 匯出工具</title>
    <!-- 引入 Tailwind CSS 網頁美化 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 引入 React 與 Babel 讓瀏覽器直接執行 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-w-full { width: 100% !important; }
            .print-border-none { border: none !important; }
            .print-shadow-none { box-shadow: none !important; }
            .print-h-auto { height: auto !important; }
            .print-overflow-visible { overflow: visible !important; }
            .print-static { position: static !important; }
            .print-text-black { color: black !important; }
            .print-bg-transparent { background-color: transparent !important; }
            div { page-break-inside: avoid; }
            .whitespace-pre-wrap { page-break-inside: auto; }
            @page { margin: 2cm; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [conversations, setConversations] = useState([]);
            const [selectedConv, setSelectedConv] = useState(null);
            const [error, setError] = useState('');
            const [isLoaded, setIsLoaded] = useState(false);

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                setError('');
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (Array.isArray(json)) {
                            setConversations(json);
                            setIsLoaded(true);
                            if (json.length > 0) setSelectedConv(json[0]);
                        } else {
                            setError('檔案內容似乎不是完整的 Claude 匯出格式，請確保上傳正確的 json 或 txt 檔。');
                        }
                    } catch (err) {
                        setError('檔案解析失敗。請確認上傳的是完整且未被修改過的 Claude 匯出檔案。');
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div class="min-h-screen flex flex-col">
                    <header class="bg-white shadow-sm p-4 flex justify-between items-center no-print">
                        <div class="flex items-center space-x-2 text-indigo-600 font-bold text-xl">
                            <span>📄 Claude 紀錄還原與 PDF 匯出工具</span>
                        </div>
                        {isLoaded && (
                            <button onClick={() => window.print()} class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm flex items-center gap-2">
                                <span>🖨️ 匯出成 PDF (列印)</span>
                            </button>
                        )}
                    </header>

                    <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6">
                        {!isLoaded ? (
                            <div class="mt-10 bg-white p-10 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center max-w-2xl mx-auto">
                                <div class="w-16 h-16 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center text-2xl mb-4">📁</div>
                                <h2 class="text-2xl font-bold text-gray-800 mb-2">上傳你的對話紀錄</h2>
                                <p class="text-gray-500 mb-8">請上傳你的 <span class="font-mono bg-gray-100 px-1 py-0.5 rounded text-gray-700">聊天內容.txt</span> 檔案。</p>
                                <label class="cursor-pointer bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold shadow-sm inline-block">
                                    <span>選擇檔案並開始還原</span>
                                    <input type="file" accept=".txt,.json" onChange={handleFileUpload} class="hidden" />
                                </label>
                                {error && <div class="mt-4 p-3 bg-red-50 text-red-600 rounded-lg text-sm">{error}</div>}
                            </div>
                        ) : (
                            <div class="flex flex-col md:flex-row gap-6 h-[80vh]">
                                <div class="w-full md:w-1/3 bg-white border border-gray-200 rounded-xl overflow-hidden flex flex-col no-print h-full shadow-sm">
                                    <div class="p-4 border-b border-gray-100 bg-gray-50 font-bold text-gray-700">對話列表 ({conversations.length})</div>
                                    <div class="overflow-y-auto flex-1 p-2 space-y-1">
                                        {conversations.map((conv, idx) => (
                                            <button key={idx} onClick={() => setSelectedConv(conv)} class={`w-full text-left p-3 rounded-lg text-sm ${selectedConv === conv ? 'bg-indigo-50 border border-indigo-100 text-indigo-700 font-medium' : 'hover:bg-gray-50 text-gray-600'}`}>
                                                <div class="truncate">{conv.name || '未命名對話'}</div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div class="w-full md:w-2/3 bg-white border border-gray-200 rounded-xl overflow-y-auto flex flex-col h-full shadow-sm print-w-full print-border-none print-shadow-none print-h-auto print-overflow-visible">
                                    {selectedConv && (
                                        <>
                                            <div class="p-6 border-b border-gray-100 bg-white sticky top-0 z-10 print-static print:border-b-2 print:border-gray-800">
                                                <h2 class="text-2xl font-bold text-gray-800">{selectedConv.name || '未命名對話'}</h2>
                                            </div>
                                            <div class="p-6 space-y-6 flex-1 print-p-0 print:mt-6">
                                                {selectedConv.chat_messages?.map((msg, idx) => (
                                                    <div key={idx} class={`flex ${msg.sender === 'assistant' ? 'justify-start' : 'justify-end'} print-justify-start print:mb-6`}>
                                                        <div class={`max-w-[85%] rounded-2xl p-4 print-w-full print-p-0 print-border-none print-bg-transparent ${msg.sender === 'assistant' ? 'bg-gray-100 text-gray-800' : 'bg-indigo-600 text-white'}`}>
                                                            <div class="font-bold text-xs mb-1 opacity-70 print-text-black print:text-lg print:border-b print:pb-1 print:mb-2">{msg.sender === 'assistant' ? '🤖 Claude' : '👤 你'}</div>
                                                            <div class="whitespace-pre-wrap leading-relaxed text-[15px] print-text-black">{msg.text}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
